# Replaces DEPLOY_SHA_PLACEHOLDER in HTML with $GITHUB_SHA before upload (prod revision marker).
name: Deploy portfolio to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject deploy commit SHA into HTML
        env:
          SHA: ${{ github.sha }}
        run: |
          set -e
          for f in index.html personal-project.html; do
            if [ -f "$f" ]; then
              sed -i "s|DEPLOY_SHA_PLACEHOLDER|${SHA}|g" "$f"
            fi
          done

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
