<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script>
    (function syncLangAttr() {
      try {
        document.documentElement.lang =
          localStorage.getItem("hugo-portfolio-language") === "es" ? "es" : "en";
      } catch (_) {}
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Personal project detail page" />
  <title>Personal Project | Hugo Pena Cantonero</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script>
    (function setBasePath() {
      const pathname = window.location.pathname;
      let basePath = "";

      const prettyMarker = "/personal-project/";
      const prettyIndex = pathname.indexOf(prettyMarker);
      if (prettyIndex >= 0) {
        basePath = pathname.slice(0, prettyIndex);
      } else {
        const fileName = "personal-project.html";
        const fileIndex = pathname.lastIndexOf(fileName);
        if (fileIndex >= 0) {
          basePath = pathname.slice(0, fileIndex).replace(/\/$/, "");
        }
      }

      window.__BASE_PATH__ = basePath;

      const favicon = document.querySelector("link[rel='icon']");
      if (favicon) {
        favicon.href = `${basePath}/assets/favicon.svg`;
      }

      const stylesheet = document.createElement("link");
      stylesheet.rel = "stylesheet";
      stylesheet.href = `${basePath}/src/styles/project-detail.css`;
      document.head.appendChild(stylesheet);
    })();
  </script>
</head>
<body>
  <script>
    (function syncThemeBeforePaint() {
      try {
        if (localStorage.getItem("hugo-portfolio-theme") === "light") {
          document.body.classList.add("light");
        }
      } catch (_) {
        /* ignore private mode / blocked storage */
      }
    })();
  </script>
  <header class="topbar">
    <div class="container topbar-inner">
      <a id="back-link" class="back-link" href="/index.html#personal-projects">← Back to personal projects</a>
      <div class="topbar-controls">
        <button id="language-toggle" class="theme-toggle" type="button" aria-label="Toggle language">EN</button>
        <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle theme">🌙</button>
      </div>
    </div>
  </header>

  <main>
    <section class="section hero">
      <div class="container card">
        <h1 id="project-title">Project not found</h1>
        <p id="project-overview">The selected project does not exist.</p>
        <div class="actions">
          <a id="project-repo" class="btn primary" href="#" target="_blank" rel="noopener noreferrer">Repository</a>
          <a class="btn secondary" href="/index.html#contact">Contact</a>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="container card">
        <h2 id="doc-title">Documentation</h2>
        <ul id="doc-list" class="doc-list"></ul>
      </div>
    </section>

    <section class="section">
      <div class="container card">
        <h2 id="demo-title">Visual demo</h2>
        <div id="demo-grid" class="demo-grid"></div>
      </div>
    </section>
  </main>

  <footer class="footer footer--minimal">
    <p
      id="deploy-revision"
      class="deploy-revision"
      hidden
      translate="no"
      aria-hidden="true"
      title="Git commit deployed on GitHub Pages"
    >
      DEPLOY_SHA_PLACEHOLDER
    </p>
  </footer>

  <div
    id="image-lightbox"
    class="image-lightbox"
    hidden
    role="dialog"
    aria-modal="true"
    aria-label="Expanded screenshot"
    tabindex="-1"
  >
    <div class="image-lightbox-content">
      <img id="image-lightbox-img" class="image-lightbox-img" src="" alt="" />
    </div>
  </div>

  <script>
    (function fixNavLinksForPagesBase() {
      const bp = window.__BASE_PATH__ || "";
      const home = bp ? `${bp}/index.html` : "/index.html";
      const back = document.getElementById("back-link");
      if (back) back.href = `${home}#personal-projects`;
      const contact = document.querySelector(".btn.secondary");
      if (contact) contact.href = `${home}#contact`;
    })();
  </script>
  <script>
    (function loadScripts() {
      const basePath = window.__BASE_PATH__ || "";
      const script = document.createElement("script");
      script.src = `${basePath}/src/js/personal-project-detail.js`;
      script.defer = true;
      document.body.appendChild(script);
    })();
  </script>
</body>
</html>
